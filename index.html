<!DOCTYPE html>
<html>

<head>

<title>FWPD Command Portal</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

<div class="logoLeft">
<img src="images/fwpd_patch.png">
</div>

<div class="title">
FWPD COMMAND PORTAL
</div>

<div class="logoRight">
<img src="images/fwpd_badge.png">
</div>

</div>


<div class="container">

<div class="sidebar">

<a href="javascript:loadPage('dashboard')">Dashboard</a>
<a href="javascript:loadPage('roster')">Officer Roster</a>
<a href="javascript:loadPage('divisions')">Divisions</a>
<a href="javascript:loadPage('discipline')">Discipline</a>

</div>


<div class="content" id="content">

Welcome to the FWPD Command Portal.

</div>

</div>

<script src="app.js"></script>
<script>
// Ensure sidebar links are clickable
document.addEventListener('DOMContentLoaded', function() {
  const sidebarLinks = document.querySelectorAll('.sidebar a');
  sidebarLinks.forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const page = this.getAttribute('data-page');
      if (page) {
        loadPage(page);
      }
    });
  });
});
</script>

</body>

</html>
